services:
  - type: web
    name: hydra-api
    env: node
    region: sao-paulo
    buildCommand: npm install && npm run db:generate && npm run build:shared && npm run build:database && npm run build --workspace=apps/api
    startCommand: node apps/api/dist/main.js
    healthCheckPath: /api/docs
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: FRONTEND_URL
        value: https://hydra-ai.vercel.app
