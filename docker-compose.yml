services:
  postgres:
    image: postgres:16-alpine
    container_name: hydra-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: hydra_ai
      POSTGRES_USER: hydra
      POSTGRES_PASSWORD: hydra123
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hydra -d hydra_ai"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
